name: '@3-/srv test (系统服务自动化测试)'

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  test:
    name: Test on / 运行环境 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./srv
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code / 检出代码
      uses: actions/checkout@v4

    - name: Setup Node.js Environment / 配置 Node.js 环境
      uses: actions/setup-node@v6

    - name: Install Dependencies / 安装依赖包
      run: npm install

    - name: Run Vitest with Real Services / 执行系统服务挂载真实端到端测试
      run: npm run test
